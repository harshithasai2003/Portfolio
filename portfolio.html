<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f1a;
    color: white;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    padding: 20px 10%;
}

.navbar {
    display: flex;
    align-items: center;
    width: 100%;
}

.navbar a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    position: relative;
    transition: 0.3s;
}

.navbar a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -5px;
    width: 0%;
    height: 2px;
    background: linear-gradient(90deg, #36d1dc, #ff2e88);
    transition: 0.3s;
}

.navbar a:hover {
    color: #ff2e88;
}

.navbar a:hover::after {
    width: 100%;
}

/* LANGUAGE BUTTONS */
.lang-switch {
    margin-left: auto;
    display: flex;
    gap: 10px;
}

.lang-switch button {
    background: transparent;
    border: none;
    color: white;
    cursor: pointer;
    font-size: 16px;
}

/* HOME SECTION */
.home {
    text-align: center;
    margin-top: 120px;
    padding: 20px;
}

/* SOCIAL ICONS */
.home-sci {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 30px;
}

.home-sci a {
    font-size: 30px;
    color: #36d1dc;
    transition: 0.3s;
}

.home-sci a:hover {
    color: #ff2e88;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 12px 25px;
    background: linear-gradient(90deg, #36d1dc, #ff2e88);
    color: white;
    border-radius: 30px;
    text-decoration: none;
    margin-top: 20px;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255,46,136,0.4);
}
</style>

</head>
